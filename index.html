<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars - Persistent Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: 'Arial Black', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #lobby-ui, #shop-ui {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)); z-index: 20; color: white;
        }
        #shop-ui { display: none; background: #2c3e50; }

        .header-stats { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; font-size: 20px; z-index: 30; pointer-events: none; }
        .coin-val { color: #ffcc00; }
        .trophy-val { color: #5dade2; }

        .brawler-select, .skin-list { display: flex; gap: 10px; margin: 15px 0; pointer-events: auto; }
        .card { 
            width: 110px; padding: 10px; background: rgba(255,255,255,0.1); border: 3px solid #fff; 
            border-radius: 12px; cursor: pointer; text-align: center; font-size: 12px;
        }
        .card.active { border-color: #ffcc00; background: rgba(255, 204, 0, 0.2); }
        .card.locked { opacity: 0.4; filter: grayscale(1); }

        .btn { pointer-events: auto; padding: 12px 25px; border: 4px solid #000; border-radius: 10px; font-size: 18px; cursor: pointer; margin: 5px; text-transform: uppercase; }
        .play-btn { background: #ffcc00; color: #000; box-shadow: 0 5px 0 #b38f00; }
        .shop-btn { background: #e91e63; color: #fff; box-shadow: 0 5px 0 #880e4f; }

        .mobile-ctrl { display: none; position: absolute; pointer-events: auto; z-index: 15; }
        .joystick-base { width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; bottom: 20px; }
        .stick { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: rgba(255,255,255,0.4); border-radius: 50%; }
        #move-base { left: 30px; }
        #shoot-base { right: 30px; }
        #super-btn { bottom: 130px; right: 45px; width: 60px; height: 60px; background: #555; border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; opacity: 0.5; }
        #super-btn.ready { background: #f1c40f; opacity: 1; box-shadow: 0 0 15px #f1c40f; }

        #game-ui { position: absolute; top: 15px; left: 15px; display: none; z-index: 10; color: white; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="coin-val">🪙 <span id="coins-val">100</span></div>
        <div class="trophy-val">🏆 <span id="trophies-val">0</span></div>
    </div>

    <div id="lobby-ui">
        <h1 style="-webkit-text-stroke: 1px #000;">BRAWL STARS</h1>
        <div class="brawler-select" id="brawler-list"></div>
        <button class="btn play-btn" onclick="startMatch()">В БОЙ!</button>
        <button class="btn shop-btn" onclick="toggleShop(true)">МАГАЗИН</button>
        <button class="btn" style="background:#cc3300; font-size: 10px; padding: 5px;" onclick="resetProgress()">СБРОСИТЬ ПРОГРЕСС</button>
    </div>

    <div id="shop-ui">
        <h1>МАГАЗИН СКИНОВ</h1>
        <div class="skin-list">
            <div class="card" onclick="buySkin('default')"><h3>ОБЫЧНЫЙ</h3><p>0 🪙</p></div>
            <div class="card" id="card-gold" onclick="buySkin('gold')"><h3 style="color:gold">ЗОЛОТО</h3><p>200 🪙</p></div>
            <div class="card" id="card-dark" onclick="buySkin('dark')"><h3 style="color:#555">ТЕНЬ</h3><p>400 🪙</p></div>
        </div>
        <button class="btn" style="background:#555" onclick="toggleShop(false)">НАЗАД</button>
    </div>

    <div id="game-ui">
        <div style="font-size: 20px;">SCORE: <span id="score">0</span></div>
    </div>

    <div id="move-base" class="mobile-ctrl joystick-base"><div id="move-stick" class="stick"></div></div>
    <div id="shoot-base" class="mobile-ctrl joystick-base"><div id="shoot-stick" class="stick"></div></div>
    <div id="super-btn" class="mobile-ctrl" onclick="useSuper()">ULT</div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'LOBBY', score = 0, coins = 100, trophies = 0, superCharge = 0, isGameOver = false;
let isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

// БАЗОВЫЕ ДАННЫЕ (будут перезаписаны загрузкой)
let brawlerData = { colt: { lvl: 1, owned: true }, shelly: { lvl: 1, owned: true }, leon: { lvl: 1, owned: false } };
let ownedSkins = ['default'];
let currentSkin = 'default';

// СОХРАНЕНИЕ И ЗАГРУЗКА
function saveData() {
    const data = { coins, trophies, brawlerData, ownedSkins, currentSkin };
    localStorage.setItem('brawlData', JSON.stringify(data));
}

function loadData() {
    const saved = localStorage.getItem('brawlData');
    if (saved) {
        const d = JSON.parse(saved);
        coins = d.coins; trophies = d.trophies; brawlerData = d.brawlerData;
        ownedSkins = d.ownedSkins; currentSkin = d.currentSkin;
    }
}

function resetProgress() {
    if(confirm("Удалить весь прогресс?")) { localStorage.removeItem('brawlData'); location.reload(); }
}

const SKIN_COLORS = { default: null, gold: '#ffd700', dark: '#2c3e50' };
const BRAWLERS = {
    colt: { name: 'COLT', color: '#3498db', hp: 80, dmg: 40, range: 75, speed: 5.5 },
    shelly: { name: 'SHELLY', color: '#9b59b6', hp: 120, dmg: 35, range: 45, speed: 4.8 },
    leon: { name: 'LEON', color: '#2ecc71', hp: 90, dmg: 45, range: 90, speed: 6.5 }
};

let selectedId = 'colt';
const player = { x: 0, y: 0, hp: 0, maxHp: 0, dmg: 0, speed: 0, range: 0, color: '', lastShot: 0 };
const enemies = [], bullets = [], boxes = [], keys = {};
const sticks = { move: { x: 0, y: 0, active: false }, shoot: { x: 0, y: 0, active: false } };

if (isMobile) document.querySelectorAll('.mobile-ctrl').forEach(el => el.style.display = 'flex');

function initLobby() {
    const list = document.getElementById('brawler-list');
    list.innerHTML = '';
    if (trophies >= 500) brawlerData.leon.owned = true;
    for (let id in BRAWLERS) {
        const b = BRAWLERS[id], data = brawlerData[id], card = document.createElement('div');
        card.className = `card ${id === selectedId ? 'active' : ''} ${!data.owned ? 'locked' : ''}`;
        const cost = data.lvl * 50;
        card.innerHTML = `<h3>${b.name}</h3><p>СИЛА ${data.lvl}</p>${data.owned ? `<button onclick="event.stopPropagation(); upgrade('${id}')" style="font-size:9px; cursor:pointer">УЛУЧШИТЬ (${cost})</button>` : '<p>500🏆</p>'}`;
        card.onclick = () => data.owned && (selectedId = id, initLobby(), saveData());
        list.appendChild(card);
    }
    document.getElementById('coins-val').innerText = coins;
    document.getElementById('trophies-val').innerText = trophies;
}

function upgrade(id) {
    const cost = brawlerData[id].lvl * 50;
    if (coins >= cost) { coins -= cost; brawlerData[id].lvl++; initLobby(); saveData(); }
}

function buySkin(id) {
    const p = { default: 0, gold: 200, dark: 400 };
    if (ownedSkins.includes(id)) currentSkin = id;
    else if (coins >= p[id]) { coins -= p[id]; ownedSkins.push(id); currentSkin = id; }
    initLobby(); saveData();
}

function toggleShop(open) {
    document.getElementById('lobby-ui').style.display = open ? 'none' : 'flex';
    document.getElementById('shop-ui').style.display = open ? 'flex' : 'none';
}

function startMatch() {
    gameState = 'PLAYING'; isGameOver = false; score = 0; superCharge = 0;
    const base = BRAWLERS[selectedId], mult = 1 + (brawlerData[selectedId].lvl - 1) * 0.1;
    Object.assign(player, base);
    player.hp = base.hp * mult; player.maxHp = player.hp; player.dmg = base.dmg * mult;
    player.color = SKIN_COLORS[currentSkin] || base.color;
    player.x = canvas.width/2; player.y = canvas.height/2;
    enemies.length = 0; bullets.length = 0; boxes.length = 0;
    document.getElementById('lobby-ui').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
}

// УПРАВЛЕНИЕ
window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code==='Space' && superCharge>=100) useSuper(); });
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', e => { if(gameState==='PLAYING' && !isMobile) fire(Math.atan2(e.clientY-player.y, e.clientX-player.x)); });

function setupJoystick(id, stickObj, handleId) {
    const base = document.getElementById(id), handle = document.getElementById(handleId);
    base.addEventListener('touchstart', e => { stickObj.active = true; updateStick(e, base, stickObj, handle); });
    base.addEventListener('touchmove', e => { if(stickObj.active) updateStick(e, base, stickObj, handle); });
    base.addEventListener('touchend', () => { stickObj.active = false; stickObj.x = 0; stickObj.y = 0; handle.style.transform = 'translate(0,0)'; });
}

function updateStick(e, base, stickObj, handle) {
    const rect = base.getBoundingClientRect(), touch = Array.from(e.touches).find(t => t.clientX > rect.left && t.clientX < rect.right);
    if(!touch) return;
    const dx = touch.clientX - (rect.left + 50), dy = touch.clientY - (rect.top + 50);
    const angle = Math.atan2(dy, dx), dist = Math.min(Math.hypot(dx, dy), 40);
    stickObj.x = Math.cos(angle) * (dist/40); stickObj.y = Math.sin(angle) * (dist/40);
    handle.style.transform = `translate(${stickObj.x*25}px, ${stickObj.y*25}px)`;
}
if(isMobile) { setupJoystick('move-base', sticks.move, 'move-stick'); setupJoystick('shoot-base', sticks.shoot, 'shoot-stick'); }

function fire(angle, isSuper = false) {
    bullets.push({ x: player.x, y: player.y - 15, vx: Math.cos(angle)*18, vy: Math.sin(angle)*18, life: player.range, isSuper });
}

function useSuper() {
    if (superCharge < 100) return;
    superCharge = 0; document.getElementById('super-btn').classList.remove('ready');
    for(let i=0; i<12; i++) fire((Math.PI*2/12)*i, true);
}

function drawBrawler(x, y, color, hpPerc) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(0, 10, 20, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = color; ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.roundRect(-20, -25, 40, 45, 10); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fbc02d'; ctx.beginPath(); ctx.arc(0, -25, 20, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#000'; ctx.fillRect(-25, -60, 50, 8);
    ctx.fillStyle = hpPerc > 0.4 ? '#00e676' : '#ff1744';
    ctx.fillRect(-25, -60, 50 * Math.max(0, hpPerc), 8);
    ctx.restore();
}

function update() {
    if (gameState !== 'PLAYING' || isGameOver) return;
    let vx = 0, vy = 0;
    if (keys['KeyW']) vy -= 1; if (keys['KeyS']) vy += 1;
    if (keys['KeyA']) vx -= 1; if (keys['KeyD']) vx += 1;
    if (isMobile) { vx = sticks.move.x; vy = sticks.move.y; }
    player.x += vx * player.speed; player.y += vy * player.speed;
    
    if (isMobile && sticks.shoot.active && Date.now() - player.lastShot > 300) {
        fire(Math.atan2(sticks.shoot.y, sticks.shoot.x)); player.lastShot = Date.now();
    }

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy; b.life--;
        if(b.life <= 0) bullets.splice(i, 1);
        enemies.forEach((en, ei) => {
            if(Math.hypot(b.x - en.x, b.y - en.y) < 30) {
                en.hp -= player.dmg; bullets.splice(i, 1);
                if(!b.isSuper && superCharge < 100) { superCharge += 5; if(superCharge>=100) document.getElementById('super-btn').classList.add('ready'); }
                if(en.hp <= 0) { if(Math.random()<0.2) boxes.push({x:en.x, y:en.y}); enemies.splice(ei,1); score += 100; coins += 5; }
            }
        });
    });
    boxes.forEach((box, bi) => { if(Math.hypot(player.x - box.x, player.y - box.y) < 40) { coins += 50; boxes.splice(bi, 1); saveData(); } });
    enemies.forEach(en => {
        const a = Math.atan2(player.y - en.y, player.x - en.x);
        en.x += Math.cos(a)*2.3; en.y += Math.sin(a)*2.3;
        if(Math.hypot(player.x - en.x, player.y - en.y) < 35) { player.hp -= 1; if(player.hp <= 0) isGameOver = true; }
    });
    if(enemies.length < 4) enemies.push({ x: Math.random()*canvas.width, y: -50, hp: 100 });
}

function draw() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const s = 80;
    for(let i=0; i<canvas.width/s+1; i++) for(let j=0; j<canvas.height/s+1; j++) {
        ctx.fillStyle = (i+j)%2==0 ? '#54a044' : '#4c943c'; ctx.fillRect(i*s, j*s, s, s);
    }
    if (gameState === 'LOBBY') drawBrawler(canvas.width/2, canvas.height/2, SKIN_COLORS[currentSkin] || BRAWLERS[selectedId].color, 1);
    else {
        boxes.forEach(b => { ctx.fillStyle = '#2196f3'; ctx.fillRect(b.x-15, b.y-15, 30, 30); });
        bullets.forEach(b => { ctx.fillStyle = b.isSuper ? '#ffcc00' : '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, b.isSuper?10:6, 0, Math.PI*2); ctx.fill(); });
        enemies.forEach(en => drawBrawler(en.x, en.y, '#e91e63', en.hp/100));
        drawBrawler(player.x, player.y, player.color, player.hp/player.maxHp);
        if (isGameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#fff'; ctx.font = '40px Arial'; ctx.textAlign='center';
            ctx.fillText(score >= 500 ? '+10 🏆' : '-5 🏆', canvas.width/2, canvas.height/2);
            setTimeout(() => { if(isGameOver){ trophies += (score>=500?10:-5); gameState='LOBBY'; document.getElementById('lobby-ui').style.display='flex'; document.getElementById('game-ui').style.display='none'; initLobby(); isGameOver=false; saveData();} }, 2000);
        } else update();
    }
    requestAnimationFrame(draw);
}
loadData(); initLobby(); draw();
</script>
</body>
</html>
